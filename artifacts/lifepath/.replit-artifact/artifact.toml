kind = "web"
previewPath = "/"
title = "LifePath 2.0"
version = "1.0.0"
id = "artifacts/lifepath"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22368

[services.development]
run = "pnpm --filter @workspace/lifepath run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lifepath", "run", "build" ]
publicDir = "artifacts/lifepath/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22368"
BASE_PATH = "/"
